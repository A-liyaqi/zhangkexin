<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张可馨 - 个人主页</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        /* 导航栏样式 */
        nav {
            background-color: #2c3e50;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 16px 28px;
            font-size: 16px;
            transition: background 0.3s;
        }

        nav a:hover {
            background-color: #3498db;
        }

        /* 容器通用样式 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 个人信息区域 */
        .about {
            text-align: center;
            padding: 60px 20px;
        }

        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #3498db;
            margin-bottom: 20px;
            background: #e8edf2;
        }

        .about h1 {
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .about .major {
            font-size: 18px;
            color: #3498db;
            margin-bottom: 20px;
        }

        .about .desc {
            max-width: 600px;
            margin: 0 auto;
            font-size: 16px;
            color: #666;
        }

        /* 技能区域 */
        .skills {
            background-color: #fff;
        }

        .title {
            text-align: center;
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 40px;
            position: relative;
        }

        .title::after {
            content: "";
            display: block;
            width: 80px;
            height: 3px;
            background: #3498db;
            margin: 10px auto;
        }

        .skill-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .skill-item {
            background: #f5f7fa;
            padding: 20px 35px;
            border-radius: 8px;
            font-size: 17px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }

        .skill-item:hover {
            transform: translateY(-5px);
        }

        /* 底部联系方式 */
        footer {
            background-color: #2c3e50;
            color: #fff;
            text-align: center;
            padding: 40px 20px;
        }

        footer p {
            margin: 10px 0;
            font-size: 16px;
        }

        footer a {
            color: #3498db;
            text-decoration: none;
        }

        /* 响应式适配 - 手机端 */
        @media (max-width: 576px) {
            nav a {
                padding: 12px 18px;
                font-size: 15px;
            }

            .about h1 {
                font-size: 26px;
            }

            .avatar {
                width: 130px;
                height: 130px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav>
        <div class="nav-container">
            <a href="#home">首页</a>
            <a href="#about">关于我</a>
            <a href="#skills">技能</a>
            <a href="#contact">联系方式</a>
        </div>
    </nav>

    <!-- 个人信息介绍区 -->
    <section id="home" class="about" style="background: #fff;">
        <!-- 头像：可替换为自己的图片链接 -->
        <img class="avatar" src="" alt="头像">
        <h1>张可馨</h1>
        <p class="major">计算机应用技术</p>
        <p class="desc">
            热爱计算机技术，专注于前端开发与设计相关学习。性格踏实认真，乐于钻研新知识，不断提升自身专业能力，期待在技术道路上稳步前行。
        </p>
    </section>

    <!-- 技能展示区 -->
    <section id="skills" class="skills container">
        <h2 class="title">专业技能</h2>
        <div class="skill-list">
            <div class="skill-item">HTML</div>
            <div class="skill-item">CSS</div>
            <div class="skill-item">Java</div>
            <div class="skill-item">Photoshop</div>
            <div class="skill-item">办公软件</div>
            <div class="skill-item">计算机基础</div>
        </div>
    </section>

    <!-- 底部联系方式 -->
    <footer id="contact">
        <h2 class="title" style="color:#fff;">联系方式</h2>
        <p>邮箱：<a href="mailto:3378034056@qq.com">3378034056@qq.com</a></p>
        <p>电话：19137715991</p>
    </footer>
</body>
</html>
